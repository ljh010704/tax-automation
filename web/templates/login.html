﻿{% extends "base.html" %}
{% block title %}登录 - 税务自动化系统{% endblock %}
{% block content_guest %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">🏛️</div>
        </div>
        <h1>税务自动化系统</h1>
        <p class="auth-subtitle">请登录您的账户</p>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required autofocus placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>
        <p class="auth-link">还没有账户？ <a href="{{ url_for('auth.register') }}">立即注册</a></p>
    </div>
</div>
{% endblock %}
