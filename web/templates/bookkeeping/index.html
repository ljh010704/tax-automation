{% extends "base.html" %}
{% block title %}记账{% endblock %}
{% block content_auth %}
<div class="page-header">
    <h1>记账管理</h1>
</div>

<div class="card">
    <h2>企业列表</h2>
    {% if entities %}
    <table class="table">
        <thead><tr><th>企业名称</th><th>类型</th><th>操作</th></tr></thead>
        <tbody>
        {% for e in entities %}
            <tr>
                <td>{{ e.name }}</td>
                <td>{{ e.entity_type }}</td>
                <td><a href="{{ url_for('bookkeeping.entity_transactions', entity_id=e.id) }}" class="btn btn-sm btn-primary">查看账务</a></td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p class="text-muted">暂无企业 <a href="{{ url_for('entities.add_entity') }}">添加企业</a></p>
    {% endif %}
</div>
{% endblock %}
