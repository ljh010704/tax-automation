﻿{% extends "base.html" %}
{% block title %}注册 - 税务自动化系统{% endblock %}
{% block content_guest %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">🏛️</div>
        </div>
        <h1>创建账户</h1>
        <p class="auth-subtitle">注册以开始使用税务自动化系统</p>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required autofocus placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="请输入密码（至少6位）" minlength="6">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" name="password_confirm" required placeholder="请再次输入密码">
            </div>
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
        <p class="auth-link">已有账户？ <a href="{{ url_for('auth.login') }}">立即登录</a></p>
    </div>
</div>
{% endblock %}
